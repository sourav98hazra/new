<template>
    <!-- Modal -->
    <div class={modalClass} role="dialog" aria-modal="true">
        <div class="slds-modal__container">
            <!-- Modal Header -->
            <header class="slds-modal__header">
                <button class="slds-button slds-button_icon slds-modal__close slds-button_icon-inverse" 
                        title="Close" onclick={closeModal}>
                    <lightning-icon icon-name="utility:close" alternative-text="close" size="small"></lightning-icon>
                    <span class="slds-assistive-text">Close</span>
                </button>
                <h2 class="slds-text-heading_medium slds-hyphenate">Log Daily Progress</h2>
            </header>

            <!-- Modal Body -->
            <div class="slds-modal__content slds-p-around_medium" id="modal-content">
                <template if:true={isLoading}>
                    <lightning-spinner alternative-text="Loading" size="medium"></lightning-spinner>
                </template>

                <template if:false={isLoading}>
                    <!-- Task Selection -->
                    <lightning-combobox
                        name="task"
                        label="Task"
                        value={selectedTaskId}
                        placeholder="Select a task"
                        options={tasks}
                        onchange={handleTaskChange}
                        required
                        disabled={recordId}
                        class="slds-m-bottom_small">
                    </lightning-combobox>

                    <!-- Progress Date -->
                    <lightning-input
                        type="date"
                        name="progressDate"
                        label="Progress Date"
                        value={progressDate}
                        onchange={handleDateChange}
                        required
                        class="slds-m-bottom_small">
                    </lightning-input>

                    <!-- Hours Worked -->
                    <lightning-input
                        type="number"
                        name="hoursWorked"
                        label="Hours Worked"
                        value={hoursWorked}
                        onchange={handleHoursChange}
                        min="0"
                        max="24"
                        step="0.5"
                        required
                        class="slds-m-bottom_small">
                    </lightning-input>

                    <!-- Progress Percentage -->
                    <lightning-input
                        type="number"
                        name="progressPercentage"
                        label="Progress Percentage"
                        value={progressPercentage}
                        onchange={handleProgressChange}
                        min="0"
                        max="100"
                        step="5"
                        required
                        class="slds-m-bottom_small"
                        help="Estimated completion percentage for this task">
                    </lightning-input>

                    <!-- Notes -->
                    <lightning-textarea
                        name="notes"
                        label="Notes"
                        value={notes}
                        onchange={handleNotesChange}
                        max-length="1000"
                        placeholder="What did you accomplish today?"
                        class="slds-m-bottom_small">
                    </lightning-textarea>
                </template>
            </div>

            <!-- Modal Footer -->
            <footer class="slds-modal__footer">
                <button class="slds-button slds-button_neutral" onclick={closeModal}>Cancel</button>
                <button class="slds-button slds-button_brand" onclick={handleSubmit} disabled={isLoading}>
                    Save Progress
                </button>
            </footer>
        </div>
    </div>

    <!-- Backdrop -->
    <div class={backdropClass}></div>
</template>
